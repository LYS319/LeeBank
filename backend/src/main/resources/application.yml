server:
    port: 8080

spring:
    datasource:
        url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:xe}
        username: ${DB_USER:bank}
        password: ${DB_PASS:bank1234}
        driver-class-name: oracle.jdbc.OracleDriver

    jackson:
        default-property-inclusion: non_null
        serialization:
            write-dates-as-timestamps: false

mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.bank.dto
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

encryption:
    aes-key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}

cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
    level:
        com.bank: DEBUG

management:
    endpoints:
        web:
            exposure:
                include: health

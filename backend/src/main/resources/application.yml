server:
  port: 8080

spring:
  datasource:
    url: jdbc:oracle:thin:@54.180.203.150:1521/XEPDB1
    username: bank
    password: Bank1234
    driver-class-name: oracle.jdbc.OracleDriver

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.bank.dto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

encryption:
  aes-key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

logging:
  level:
    com.bank: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health